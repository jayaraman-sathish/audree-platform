databases:
  - name: audree-db
    plan: free
    databaseName: audree
    user: audree

services:
  - type: web
    name: audree-backend
    runtime: docker
    rootDir: audreeplatform/audree/backend
    dockerContext: audreeplatform/audree/backend
    dockerfilePath: audreeplatform/audree/backend/Dockerfile
    dockerCommand: >-
      sh -c "alembic upgrade head && python -m app.db.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: audree-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 8000

  - type: web
    name: audree-frontend
    runtime: docker
    rootDir: audreeplatform/audree/frontend
    dockerContext: audreeplatform/audree/frontend
    dockerfilePath: audreeplatform/audree/frontend/Dockerfile
    dockerCommand: >-
      sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: https://audree-backend.onrender.com
      - key: PORT
        value: 5173
