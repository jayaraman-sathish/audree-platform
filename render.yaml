atabases:
  - name: audree-db
    plan: free
    databaseName: audree
    user: audree

services:
  - type: web
    name: audree-backend
    runtime: docker
    rootDir: audreeplatform/audree/backend
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: audree-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: audree-frontend
    runtime: docker
    rootDir: audreeplatform/audree/frontend
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: https://audree-backend.onrender.com
